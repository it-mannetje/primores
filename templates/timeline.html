{% extends "base.html" %}
{% block title %}Tijdlijn — Canon Primores{% endblock %}

{% block content %}
<div class="timeline-page">

  <div class="tl-toolbar">
    <div class="tl-toolbar-left">
      <button class="btn-zoom" id="zoomIn"  title="Inzoomen">+</button>
      <button class="btn-zoom" id="zoomOut" title="Uitzoomen">−</button>
      <button class="btn-zoom" id="zoomReset" title="Reset zoom" style="font-size:12px;padding:0 10px;">⟳</button>
    </div>
  </div>

  <!-- Avatar filter bar -->
  <div class="tl-avatar-bar" id="avatarFilter">
    <button class="avatar-chip avatar-chip--all active" data-person="all">
      <div class="avatar-chip-img">alle</div>
      <span class="avatar-chip-name">Alle</span>
    </button>
    <button class="avatar-chip avatar-chip--primores active" data-person="primores">
      <div class="avatar-chip-img">P</div>
      <span class="avatar-chip-name">Primores</span>
    </button>
    {% for m in members %}
    <button class="avatar-chip active" data-person="{{ m.name }}" style="--mc: {{ m.color }}">
      <div class="avatar-chip-img">
        {% if member_photos.get(m.name) %}
        <img src="{{ member_photos[m.name] }}" alt="{{ m.name }}">
        {% else %}
        {{ m.name[0] }}
        {% endif %}
      </div>
      <span class="avatar-chip-name">{{ m.name }}</span>
    </button>
    {% endfor %}
  </div>

  <!-- Mini-map scrubber for quick era navigation -->
  <div class="tl-scrubber" id="tlScrubber" title="Klik om naar dat jaar te navigeren"></div>

  <div class="tl-layout" id="tlLayout">

    <!-- Scrollable timeline area -->
    <div class="tl-scroll" id="tlScroll">
      <!-- Year ruler (sticky top) -->
      <div class="tl-ruler" id="tlRuler"></div>

      <!-- Canvas: lanes rendered by JS -->
      <div class="tl-canvas" id="tlCanvas">
        <div class="tl-lane tl-lane--primores" id="lane-Primores"></div>
        <div class="tl-lane" id="lane-flat"></div>
      </div>
    </div>
  </div>

</div>

<!-- Event detail modal -->
<div class="modal-overlay" id="eventModal" hidden aria-modal="true" role="dialog">
  <div class="modal-box" id="modalBox">
    <button class="modal-close" id="modalClose" aria-label="Sluiten">✕</button>
    <div id="modalContent"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>const MEMBERS = {{ members | tojson }};</script>
<script src="{{ url_for('static', filename='js/timeline.js') }}"></script>
{% endblock %}
